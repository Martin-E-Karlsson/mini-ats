spring.application.name=mini-ats

# Load secrets from the gitignored .env file (SUPABASE_DB_PASSWORD, SUPABASE_ANON_KEY,
# SUPABASE_SERVICE_ROLE_KEY). "optional:" means startup won't fail if the file is absent.
spring.config.import=optional:file:.env[.properties]

# --- Database (Supabase via transaction pooler) ---

# Note the prepareThreshold=0 — REQUIRED for the transaction pooler.

spring.datasource.url=jdbc:postgresql://aws-1-eu-north-1.pooler.supabase.com:6543/postgres?prepareThreshold=0

spring.datasource.username=postgres.ffzxzyazmfwgltitykue

spring.datasource.password=${SUPABASE_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5

# Schema is owned by ats_schema.sql — let Hibernate validate, not modify.

spring.jpa.hibernate.ddl-auto=validate

# --- Supabase Auth ---

supabase.url=${SUPABASE_URL}

# New-format keys: publishable = anon-equivalent, secret = service_role-equivalent
supabase.anon-key=${SUPABASE_PUBLISHABLE_KEY}

supabase.service-role-key=${SUPABASE_SECRET_KEY}

# For validating Supabase-issued JWTs (used if/when the browser sends tokens)

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URL}
