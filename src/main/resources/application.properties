spring.application.name=mini-ats

# --- Database (Supabase via transaction pooler) ---

# Note the prepareThreshold=0 — REQUIRED for the transaction pooler.

spring.datasource.url=jdbc:postgresql://aws-0-<region>.pooler.supabase.com:6543/postgres?prepareThreshold=0

spring.datasource.username=postgres.<project-ref>

spring.datasource.password=${SUPABASE_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5

# Schema is owned by ats_schema.sql — let Hibernate validate, not modify.

spring.jpa.hibernate.ddl-auto=validate

# --- Supabase Auth ---

supabase.url=https://<project-ref>.supabase.co

supabase.anon-key=${SUPABASE_ANON_KEY}

supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# For validating Supabase-issued JWTs (used if/when the browser sends tokens)

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://<project-ref>.supabase.co/auth/v1/jwks
