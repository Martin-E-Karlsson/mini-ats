<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini-ATS · Candidate</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/nav :: topbar}"></header>

<main class="container">
    <h2 th:text="${candidate.id} != null ? 'Edit candidate' : 'New candidate'">New candidate</h2>

    <div class="card">
        <!-- New candidates POST to /candidates; existing ones POST to /candidates/{id} -->
        <form th:action="${candidate.id} != null ? @{/candidates/{id}(id=${candidate.id})} : @{/candidates}"
              th:object="${candidate}" method="post">

            <div class="form-row">
                <label for="fullName">Full name *</label>
                <input id="fullName" type="text" th:field="*{fullName}" required>
                <div class="field-error" th:if="${#fields.hasErrors('fullName')}"
                     th:errors="*{fullName}">Name error</div>
            </div>

            <div class="form-row">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}">
            </div>

            <div class="form-row">
                <label for="linkedinUrl">LinkedIn URL</label>
                <input id="linkedinUrl" type="url" th:field="*{linkedinUrl}" placeholder="https://linkedin.com/in/…">
            </div>

            <div class="form-row">
                <label for="jobId">Job</label>
                <select id="jobId" th:field="*{jobId}">
                    <option th:value="${null}">— No job —</option>
                    <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}">Job</option>
                </select>
            </div>

            <div class="form-row">
                <label for="notes">Notes</label>
                <textarea id="notes" rows="4" th:field="*{notes}"></textarea>
            </div>

            <div class="actions">
                <button class="btn" type="submit">Save</button>
                <a class="btn secondary" th:href="@{/board}">Cancel</a>
            </div>
        </form>
    </div>

    <!-- CV upload is only available once the candidate exists (needs an id). -->
    <div class="card" th:if="${candidate.id != null}">
        <h3 style="margin-top:0;">CV / Resume</h3>
        <p th:if="${candidate.cvFilename != null}">
            Current file:
            <a th:href="@{/candidates/{id}/cv(id=${candidate.id})}" th:text="${candidate.cvFilename}">cv</a>
        </p>
        <form th:action="@{/candidates/{id}/cv(id=${candidate.id})}" method="post"
              enctype="multipart/form-data">
            <div class="form-row">
                <label for="file">Upload CV (PDF or .txt, max 5MB)</label>
                <input id="file" type="file" name="file" accept=".pdf,.txt,application/pdf,text/plain" required>
            </div>
            <button class="btn" type="submit">Upload CV</button>
        </form>
        <p class="muted" style="margin-top:.5rem;">
            After uploading, open <em>Screen</em> on the board — the CV text pre-fills automatically.
        </p>
    </div>
</main>
</body>
</html>
