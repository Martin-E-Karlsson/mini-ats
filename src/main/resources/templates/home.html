<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini-ATS · Home</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/nav :: topbar}"></header>
<main class="container">
    <div class="card">
        <p>Signed in as <strong th:text="${name}">user@example.com</strong>
            <span class="pill" th:text="${role}">Role</span></p>
        <p class="muted">Supabase verified your password and Spring resolved your role.</p>
        <p class="actions">
            <a class="btn" th:href="@{/jobs}">Manage jobs</a>
            <a class="btn secondary" th:href="@{/board}">Open board</a>
        </p>
    </div>
</main>
</body>
</html>
