<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini-ATS · Home</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f5f7; margin: 0; padding: 2rem; }
        .bar { display: flex; justify-content: space-between; align-items: center;
               max-width: 720px; margin: 0 auto; }
        .pill { background: #e0e7ff; color: #3730a3; padding: .2rem .6rem; border-radius: 999px;
                font-size: .8rem; font-weight: 600; }
        button { padding: .45rem .8rem; border: 0; border-radius: 6px; background: #ef4444;
                 color: #fff; cursor: pointer; }
        .card { max-width: 720px; margin: 1.5rem auto; background: #fff; padding: 1.5rem;
                border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.06); }
    </style>
</head>
<body>
<header th:replace="~{fragments/nav :: topbar}"></header>
<div class="card" style="margin-top:1.5rem;">
    <p>Signed in as <strong th:text="${name}">user@example.com</strong>
        <span class="pill" th:text="${role}">Role</span></p>
    <p>Auth is working end-to-end: Supabase verified your password, and Spring resolved your role.</p>
    <p>
        <a class="btn" th:href="@{/jobs}">Manage jobs</a>
        <a class="btn secondary" th:href="@{/board}">Open board</a>
    </p>
</div>
</body>
</html>
